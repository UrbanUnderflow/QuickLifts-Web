# Netlify configuration for Pulse Web App
[dev]
  command = "next dev"
  framework = "next"
  port = 8888
  targetPort = 3000
  functionsPort = 9999

[build]
  command = "next build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Environment variables should be set in Netlify UI, not in the toml file
[context.production]
[context.branch-deploy]
[context.deploy-preview]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Branded OG images (route through a normal URL so bot user agents aren't blocked by /.netlify/functions)
# Keeps query params (title/subtitle) intact.
[[redirects]]
  from = "/og-image.png"
  to = "/.netlify/functions/og-image"
  status = 200
  force = true

[[redirects]]
  from = "/og-image"
  to = "/.netlify/functions/og-image"
  status = 200
  force = true

# Investor deck short link → static PDF asset
[[redirects]]
